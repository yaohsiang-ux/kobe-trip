<style>
:root{--bg:#FDF6EC;--card:#FFFBF5;--border:rgba(160,140,110,.25);--brown:#3A2A18;--brownM:#6B4E35;--brownL:#A08868;--brownXL:#D4C0A8;--orange:#C94820;--gold:#D4960A;--goldBg:#F5E8CC;--blue:#2563EB;--green:#15803D;--amber:#B45309;--purple:#6D28D9;--text:#1A1208;--text2:#4A3A28;--text3:#6E5C48}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;font-size:16px}

/* Header */
.hero{background:linear-gradient(135deg,#3A2A18,#5A3E28,#7A5E40);color:#FFF8EE;padding:36px 16px 26px;text-align:center}
.hero h1{font-size:1.9rem;font-weight:900;letter-spacing:2px;margin:4px 0}
.hero .sub{font-size:1rem;opacity:.9}
.hero .dates{display:inline-block;margin-top:10px;border:1px solid rgba(230,175,46,.5);background:rgba(230,175,46,.25);border-radius:20px;padding:4px 18px;font-size:.95rem;letter-spacing:1px;font-weight:500}
.cd{background:var(--brown);color:#F0C850;text-align:center;padding:10px;font-size:1rem;font-weight:700}
.cd b{font-size:1.35rem}

/* Toolbar */
.toolbar{position:sticky;top:0;z-index:50;background:rgba(253,246,236,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:2px solid rgba(160,140,110,.3);padding:10px 12px}
.tb-inner{max-width:720px;margin:0 auto}
.tab-row{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:5px}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:8px 18px;border-radius:10px;border:none;background:transparent;font-size:1rem;font-weight:700;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s}
.tab-btn.active{background:var(--brown);color:#fff}
.tab-btn.add{background:var(--gold);color:var(--brown);font-weight:700}
.mode-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.mode-btn{padding:6px 12px;border-radius:8px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.mode-btn.on{background:var(--orange);color:#fff}
.mode-btn.off{background:#ede4d4;color:var(--text2)}
.sm-btn{padding:6px 10px;border-radius:8px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;background:#ede4d4;color:var(--text2)}

/* Content */
.wrap{max-width:720px;margin:0 auto;padding:14px 16px 90px}
.day-sec{display:none}.day-sec.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.day-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.day-num{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,#FFE4D6,#FFD0B8);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:var(--orange);flex-shrink:0}
.day-head h2{font-size:1.3rem;font-weight:900;line-height:1.35;color:var(--brown)}
.dm{font-size:.95rem;color:var(--text3);margin-top:2px;font-weight:500}
.theme{font-size:.95rem;color:var(--text2);background:var(--goldBg);padding:10px 14px;border-radius:12px;margin-bottom:16px;border-left:4px solid var(--gold);line-height:1.7;font-weight:500}

/* Timeline */
.tl{position:relative}
.tl-line{position:absolute;left:20px;top:28px;bottom:28px;width:3px;background:linear-gradient(to bottom,var(--brownL),rgba(160,136,104,.15));border-radius:2px}
.stop{position:relative;padding-left:52px;padding-bottom:16px}
.stop-dot{position:absolute;left:12px;top:8px;width:20px;height:20px;border-radius:50%;background:var(--card);z-index:1}
.stop-dot.transport{border:3px solid var(--blue)}.stop-dot.activity{border:3px solid var(--green)}.stop-dot.meal{border:3px solid var(--amber)}.stop-dot.hotel{border:3px solid var(--purple)}
.stop-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;box-shadow:0 2px 6px rgba(75,54,33,.08)}
.stop-card.transport{border-left:5px solid var(--blue)}.stop-card.activity{border-left:5px solid var(--green)}.stop-card.meal{border-left:5px solid var(--amber)}.stop-card.hotel{border-left:5px solid var(--purple)}
.st{font-size:.88rem;font-weight:800;letter-spacing:.3px}
.st.transport{color:var(--blue)}.st.activity{color:var(--green)}.st.meal{color:var(--amber)}.st.hotel{color:var(--purple)}
.stop-title{font-size:1.1rem;font-weight:800;color:var(--brown);margin:3px 0}
.stop-desc{font-size:.95rem;color:var(--text2);line-height:1.65}
.map-btn{display:inline-flex;align-items:center;gap:4px;font-size:.88rem;font-weight:700;color:#1D6FA5;background:rgba(29,111,165,.1);padding:5px 12px;border-radius:10px;text-decoration:none;margin-top:6px}
.map-btn:hover{background:rgba(29,111,165,.18)}

/* Restaurants */
.rest-sec{margin-top:10px;border-top:2px dashed var(--brownXL);padding-top:10px}
.rest-label{font-size:.82rem;font-weight:800;color:var(--text3);margin-bottom:6px;letter-spacing:1px}
.rest-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:5px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.rest-item.sel{background:rgba(201,72,32,.08);border-color:rgba(201,72,32,.25)}
.rest-radio{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--brownL);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rest-item.sel .rest-radio{border-color:var(--orange)}
.rest-radio-dot{width:10px;height:10px;border-radius:50%;background:var(--orange);display:none}
.rest-item.sel .rest-radio-dot{display:block}
.rest-info{flex:1;min-width:0}
.rest-name{font-size:1rem;font-weight:700;color:var(--text2)}
.rest-item.sel .rest-name{color:var(--brown)}
.rest-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.rest-tag{font-size:.78rem;padding:2px 8px;border-radius:6px;background:var(--goldBg);color:var(--amber);font-weight:700}
.rest-tag.book{background:#FDE;color:#B91C1C}
.rest-note{font-size:.88rem;color:var(--text3);margin-top:3px;line-height:1.55}
.rest-nav{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(29,111,165,.12);color:var(--blue);text-decoration:none;font-size:1rem;flex-shrink:0}

/* Edit controls */
.edit-bar{display:flex;gap:4px;margin-top:8px;justify-content:flex-end;flex-wrap:wrap}
.e-btn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;font-family:inherit}
.e-add{width:100%;padding:12px;border-radius:14px;border:2px dashed var(--brownL);background:transparent;color:var(--brownM);font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
.e-add-r{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--brownL);background:transparent;color:var(--text3);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:5px}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#FFFBF5;border-radius:16px;width:100%;max-width:500px;max-height:85vh;overflow:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:1.15rem;font-weight:800;color:var(--brown)}
.modal label{font-size:.88rem;font-weight:700;color:var(--text2);margin-bottom:4px;display:block}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 12px;border:1.5px solid #CCC;border-radius:10px;font-size:1rem;font-family:inherit;background:#fff}
.modal textarea{resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions button{flex:1;padding:11px;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit}
.btn-cancel{border:1.5px solid #ccc;background:#fff;color:var(--text2)}
.btn-save{border:none;background:var(--orange);color:#fff}

/* FAB */
.fab{position:fixed;bottom:18px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--brown);color:#FDF6EC;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(75,54,33,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.fab svg{width:22px;height:22px}

/* Print */
@media print{.toolbar,.fab,.cd,.edit-bar,.e-add,.e-add-r,.mode-row{display:none!important}.day-sec{display:block!important;page-break-before:always}.day-sec:first-child{page-break-before:avoid}.stop-card{box-shadow:none}body{background:#fff}}

/* Icon picker */
.icon-grid{display:flex;flex-wrap:wrap;gap:3px}
.icon-grid button{width:32px;height:32px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:1rem;cursor:pointer}
.icon-grid button.picked{border:2px solid var(--orange);background:#FFF0EB}
.type-row{display:flex;gap:5px}
.type-btn{flex:1;padding:5px;border-radius:7px;border:none;font-size:.76rem;font-weight:600;cursor:pointer;font-family:inherit}
.type-btn.picked{color:#fff}
</style>
</head>

const STORAGE_KEY='kobe_trip_2026';
let DAYS, activeTab=0, editMode=false;

function loadData(){
  try{ const s=localStorage.getItem(STORAGE_KEY); DAYS=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_DAYS)); }
  catch(e){ DAYS=JSON.parse(JSON.stringify(DEFAULT_DAYS)); }
}
function saveData(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(DAYS));}catch(e){} }
function resetAll(){ if(confirm('確定重置為預設行程？所有修改將消失。')){localStorage.removeItem(STORAGE_KEY);loadData();render();} }

/* ═══════════ EXPORT ═══════════ */
function exportHTML(){
  // Get full page HTML, replace DEFAULT_DAYS with current DAYS
  const fullHTML=document.documentElement.outerHTML;
  // Find and replace the DEFAULT_DAYS block
  const marker1='const DEFAULT_DAYS=';
  const marker2=';\n\n/* ═══════════ STATE';
  const idx1=fullHTML.indexOf(marker1);
  const idx2=fullHTML.indexOf(marker2);
  if(idx1===-1||idx2===-1){alert('匯出失敗，請聯繫博文');return;}
  const newHTML='<!DOCTYPE html>\n<html lang="zh-TW">'+fullHTML.substring(fullHTML.indexOf('<head>'));
  // Build clean version with current data as new default
  const before=newHTML.substring(0,newHTML.indexOf(marker1)+marker1.length);
  const after=newHTML.substring(newHTML.indexOf(marker2));
  const exported=before+JSON.stringify(DAYS)+after;
  // Download
  const blob=new Blob([exported],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='index.html';
  a.click();
  URL.revokeObjectURL(a.href);
  alert('✅ 已下載 index.html\n\n更新到 GitHub 只要一行指令：\ncd ~/Desktop/kobe-trip && cp ~/Downloads/index.html . && git add . && git commit -m "更新行程" && git push');
}

/* ═══════════ MUTATIONS ═══════════ */
function toggle(di,si,ri){ DAYS[di].stops[si].r[ri].s=DAYS[di].stops[si].r[ri].s?0:1; saveData(); render(); }
function go(i){ activeTab=i; render(); }
function delStop(di,si){ DAYS[di].stops.splice(si,1); saveData(); render(); }
function moveStop(di,si,dir){ const s=DAYS[di].stops,ni=si+dir; if(ni<0||ni>=s.length)return; [s[si],s[ni]]=[s[ni],s[si]]; saveData(); render(); }
function addDay(){ DAYS.push({date:"新日期",title:"新行程日",theme:"點擊編輯",stops:[]}); activeTab=DAYS.length-1; saveData(); render(); }
function delDay(di){ if(DAYS.length<=1)return; DAYS.splice(di,1); if(activeTab>=DAYS.length)activeTab=DAYS.length-1; saveData(); render(); }
function addRest(di,si){ DAYS[di].stops[si].r.push({n:"新餐廳",q:"",tag:"自訂",note:""}); saveData(); render(); }
function delRest(di,si,ri){ DAYS[di].stops[si].r.splice(ri,1); saveData(); render(); }

function render(){

  const mb=document.getElementById('modebar');

    if(di!==activeTab) return '';
    let h=`<div class="day-sec active">`;

      <div class="day-num">D${di+1}</div><div style="flex:1">
      <h2>${day.title}${editMode?'<span style="font-size:.7rem;color:#D65A31;margin-left:6px">✏️</span>':''}</h2>
      <div class="dm">${day.date}</div></div>
      ${editMode&&DAYS.length>1?`<button class="e-btn" style="background:#fee;color:#c33" onclick="event.stopPropagation();delDay(${di})">🗑</button>`:''}
    </div>`;
    h+=`<div class="theme">🎯 ${day.theme}</div>`;
    h+=`<div class="tl">`;
    if(day.stops.length>1) h+=`<div class="tl-line"></div>`;

    day.stops.forEach((s,si)=>{
      h+=`<div class="stop"><div class="stop-dot ${s.c}"></div><div class="stop-card ${s.c}">`;
      h+=`<div class="st ${s.c}">${s.t}</div>`;
      h+=`<div class="stop-title">${s.i} ${s.n}</div>`;
      if(s.d) h+=`<div class="stop-desc">${s.d}</div>`;
      if(s.mq) h+=`<div style="display:flex;gap:5px;margin-top:6px"><a class="map-btn" href="https://www.google.com/maps/search/${s.mq}" target="_blank" rel="noopener" style="background:rgba(66,133,244,.12);color:#2557A7">G 導航</a><a class="map-btn" href="https://maps.apple.com/?q=${s.mq}" target="_blank" rel="noopener" style="background:rgba(0,0,0,.06);color:#333">🍎 導航</a></div>`;

      // Restaurants
      if(s.r&&s.r.length){
        h+=`<div class="rest-sec"><div class="rest-label">🍴 餐廳選項（點選切換）</div>`;
        s.r.forEach((r,ri)=>{
          h+=`<div class="rest-item${r.s?' sel':''}" onclick="toggle(${di},${si},${ri})">`;
          h+=`<div class="rest-radio"><div class="rest-radio-dot"></div></div><div class="rest-info">`;
          h+=`<div class="rest-name">${r.n}</div><div class="rest-tags"><span class="rest-tag">${r.tag||''}</span>`;
          if(r.bk) h+=`<span class="rest-tag book">需預約</span>`;
          h+=`</div>`;
          if(r.note) h+=`<div class="rest-note">${r.note}</div>`;
          h+=`</div>`;
          if(r.q) h+=`<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0" onclick="event.stopPropagation()"><a class="rest-nav" href="https://www.google.com/maps/search/${r.q}" target="_blank" rel="noopener" title="Google Maps" style="font-size:.7rem;font-weight:700;color:#2557A7">G</a><a class="rest-nav" href="https://maps.apple.com/?q=${r.q}" target="_blank" rel="noopener" title="Apple Maps" style="font-size:.75rem">🍎</a></div>`;
          if(editMode) h+=`<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0" onclick="event.stopPropagation()">
            <button class="e-btn" style="background:#E8F4FD;color:#3B82F6;width:22px;height:22px;font-size:.6rem" onclick="showRestModal(${di},${si},${ri})">✏️</button>
            <button class="e-btn" style="background:#FEE;color:#C33;width:22px;height:22px;font-size:.6rem" onclick="delRest(${di},${si},${ri})">✕</button>
          </div>`;
          h+=`</div>`;
        });
        if(editMode) h+=`<button class="e-add-r" onclick="addRest(${di},${si})">＋ 加餐廳</button>`;
        h+=`</div>`;
      } else if(editMode){
        h+=`<div style="margin-top:6px"><button class="e-add-r" onclick="addRest(${di},${si})">＋ 加餐廳選項</button></div>`;
      }

      // Edit controls for stop
      if(editMode){
        h+=`<div class="edit-bar">`;
        if(si>0) h+=`<button class="e-btn" style="background:#f0ebe0;color:#7A6652" onclick="moveStop(${di},${si},-1)">↑</button>`;
        if(si<day.stops.length-1) h+=`<button class="e-btn" style="background:#f0ebe0;color:#7A6652" onclick="moveStop(${di},${si},1)">↓</button>`;
        h+=`<button class="e-btn" style="background:#E8F4FD;color:#3B82F6" onclick="showStopModal(${di},${si})">✏️</button>`;
        h+=`<button class="e-btn" style="background:#FEE;color:#C33" onclick="delStop(${di},${si})">✕</button>`;
        h+=`</div>`;
      }
      h+=`</div></div>`;
    });

    if(editMode) h+=`<button class="e-add" onclick="showStopModal(${di},-1)" style="margin-left:48px">＋ 新增景點</button>`;
    h+=`</div></div>`;
    return h;
  }).join('');

  // Print FAB visibility
  document.getElementById('print-fab').style.display=editMode?'none':'flex';
}

/* ═══════════ COUNTDOWN ═══════════ */
function countdown(){
  const t=new Date('2026-04-20T06:30:00+08:00')-new Date(),el=document.getElementById('cd');
  if(t<=0){el.innerHTML=new Date()<=new Date('2026-04-25T20:30:00+08:00')?'🎌 旅行進行中！':'🏠 旅程圓滿結束！';return;}
  const d=Math.floor(t/864e5),h=Math.floor(t%864e5/36e5),m=Math.floor(t%36e5/6e4);
  el.innerHTML=`✈️ 出發倒數 <b>${d}</b> 天 <b>${h}</b> 時 <b>${m}</b> 分`;
}

/* ═══════════ INIT ═══════════ */
loadData();
if(location.hash==='#edit') editMode=true;
countdown(); setInterval(countdown,60000);
render();
</script>
